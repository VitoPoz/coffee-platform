{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Вход в систему</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="ваш@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" 
                               name="password" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                
                <div class="mt-4 p-3 bg-light rounded">
                    <h6>Тестовые аккаунты:</h6>
                    <div class="small">
                        <strong>Администратор:</strong><br>
                        Email: admin@coffee.ru<br>
                        Пароль: admin123<br><br>
                        
                        <strong>Сотрудник:</strong><br>
                        Email: barista@coffee.ru<br>
                        Пароль: 123456
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
