<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Coffee Training</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%);
            color: white;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,.8);
            padding: 0.8rem 1rem;
            margin: 0.2rem 0;
            border-radius: 5px;
        }
        .sidebar .nav-link:hover {
            background: rgba(255,255,255,.1);
            color: white;
        }
        .sidebar .nav-link.active {
            background: rgba(255,255,255,.2);
            color: white;
        }
        .sidebar .nav-link i {
            margin-right: 10px;
            width: 20px;
        }
        .main-content {
            padding: 20px;
        }
        .navbar-top {
            background: white;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 5px;
        }
        .card {
            box-shadow: 0 2px 4px rgba(0,0,0,.05);
            border: none;
            margin-bottom: 20px;
        }
        .card-header {
            background: white;
            border-bottom: 2px solid #f0f0f0;
            font-weight: 600;
        }
        .badge {
            padding: 5px 10px;
        }
        .btn-group-sm .btn {
            padding: 0.25rem 0.5rem;
        }
        .structure-item {
            background: white;
            border-left: 4px solid transparent;
        }
        .structure-item[data-type="folder"] {
            border-left-color: #ffc107;
        }
        .structure-item[data-type="lesson"] {
            border-left-color: #0dcaf0;
        }
        .handle {
            cursor: move;
            color: #6c757d;
        }
        .handle:hover {
            color: #007bff;
        }
        .nested-sortable {
            min-height: 10px;
        }
        .folder-content {
            transition: all 0.3s ease;
        }
        .toggle-icon {
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Боковое меню -->
            <div class="col-md-2 p-0 sidebar">
                <div class="p-3">
                    <h4 class="text-center mb-4">
                        <i class="fas fa-mug-hot"></i> Coffee Admin
                    </h4>
                    <hr class="bg-white">
                    <nav class="nav flex-column">
                        <a class="nav-link {% if request.endpoint == 'admin_panel' %}active{% endif %}" 
                           href="{{ url_for('admin_panel') }}">
                            <i class="fas fa-tachometer-alt"></i> Дашборд
                        </a>
                        <a class="nav-link {% if request.endpoint == 'admin_courses' %}active{% endif %}" 
                           href="{{ url_for('admin_courses') }}">
                            <i class="fas fa-book"></i> Курсы
                        </a>
                        <a class="nav-link {% if request.endpoint == 'admin_users' %}active{% endif %}" 
                           href="{{ url_for('admin_users') }}">
                            <i class="fas fa-users"></i> Пользователи
                        </a>
                        <a class="nav-link {% if request.endpoint == 'admin_library' %}active{% endif %}" 
                           href="{{ url_for('admin_library') }}">
                            <i class="fas fa-archive"></i> Библиотека
                        </a>
                        <hr class="bg-white">
                        <a class="nav-link" href="{{ url_for('dashboard') }}">
                            <i class="fas fa-arrow-left"></i> На сайт
                        </a>
                        <a class="nav-link" href="{{ url_for('logout') }}">
                            <i class="fas fa-sign-out-alt"></i> Выход
                        </a>
                    </nav>
                </div>
            </div>
            
            <!-- Основной контент -->
            <div class="col-md-10 main-content">
                <!-- Верхняя панель -->
                <div class="navbar-top d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-0">
                            {% block page_title %}Админ-панель{% endblock %}
                        </h5>
                    </div>
                    <div>
                        <span class="me-3">
                            <i class="fas fa-user"></i> {{ session.user_name }}
                        </span>
                        <span class="badge bg-primary">
                            <i class="fas fa-shield-alt"></i> Администратор
                        </span>
                    </div>
                </div>
                
                <!-- Контент страницы -->
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery (для sortable) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
